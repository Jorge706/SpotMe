name: Deploy Frontend to Kubernetes

on:
  push:
    branches: [ main ]
  pull_request:
    types: [closed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Development

    env:
      REGISTRY: spotmeacr.azurecr.io
      IMAGE_NAME: spotme-k8s-frontend
      NAMESPACE: spotme

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Azure CLI
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Azure ACR login
        run: az acr login --name spotmeacr

      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg VITE_RECAPTCHA_SITE_KEY=${{ secrets.RECAPTCHA_SITE_KEY }} \
            -t $REGISTRY/$IMAGE_NAME:latest .
          docker push $REGISTRY/$IMAGE_NAME:latest

      - name: Set up Kubeconfig
        uses: azure/aks-set-context@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          cluster-name: kubernetes-spotme-cluster
          resource-group: kubernetes-group-spotme

      - name: Deploy to Kubernetes
        run: |
          kubectl rollout restart deployment frontend -n $NAMESPACE