apiVersion: v1
kind: ConfigMap
metadata:
  name: laravel-config
  namespace: spotme # Asegúrate de que este sea el namespace correcto
data:
  APP_NAME: "SpotMe"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "http://localhost"

  LOG_CHANNEL: "stack"
  LOG_DEPRECATIONS_CHANNEL: "null"
  LOG_LEVEL: "info"

  DB_CONNECTION: "mysql"

  DB_HOST: mysql-master-service.spotme.svc.cluster.local
  REPLICA_DB_HOST: mysql-replica-service.spotme.svc.cluster.local
  DB_PORT: "50450"
  REPLICA_DB_PORT: "50460"

  DB_DATABASE: "spotme"
  MYSQL_ATTR_SSL_CA: /etc/ssl/mysql/ca-cert.pem
  DB_SSL_MODE: REQUIRED

  # Pusher para WebSockets
  BROADCAST_DRIVER: "pusher"
  CACHE_DRIVER: "file"
  FILESYSTEM_DISK: "local"
  QUEUE_CONNECTION: "sync"
  SESSION_DRIVER: "file"
  SESSION_LIFETIME: "120"

  MAIL_HOST: "smtp.gmail.com"
  MAIL_PORT: "587"
  MAIL_FROM_NAME: "SpotMe"

  AWS_DEFAULT_REGION: "us-east-1"
  AWS_USE_PATH_STYLE_ENDPOINT: "false"

  # Pusher Configuration
  PUSHER_APP_ID: ""
  PUSHER_APP_KEY: ""
  PUSHER_APP_SECRET: ""
  PUSHER_HOST: ""
  PUSHER_PORT: "443"
  PUSHER_SCHEME: "https"
  PUSHER_APP_CLUSTER: "us2"

  VITE_PUSHER_APP_KEY: "088a0f626ff602402759"
  VITE_PUSHER_PORT: "443"
  VITE_PUSHER_SCHEME: "https"
  VITE_PUSHER_APP_CLUSTER: "us2"

  MIX_PUSHER_APP_KEY: "088a0f626ff602402759"
  MIX_PUSHER_APP_CLUSTER: "us2"

  RESEND_API_KEY: ""
  MAIL_MAILER: "resend"
  MAIL_FROM_ADDRESS: "spotme@jafetguzman.me"
  JWT_TTL: "60000"