apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-master-init-scripts
  namespace: spotme
data:
  01-setup-users.sql: |
    -- Este script se ejecuta la primera vez que la base de datos es inicializada.
    -- Las contraseñas se inyectan a través de variables de entorno del contenedor.

    -- Crear usuario de replicación
    DROP USER IF EXISTS 'replicator'@'%';
    CREATE USER 'replicator'@'%' IDENTIFIED WITH mysql_native_password BY 'ReplicatorPass123!' REQUIRE SSL;
    GRANT REPLICATION SLAVE ON *.* TO 'replicator'@'%';

    -- Crear usuario de aplicación compatible con MariaDB client
    DROP USER IF EXISTS 'spotme_user'@'%';
    CREATE USER 'spotme_user'@'%' IDENTIFIED WITH mysql_native_password BY 'CHANGE_ME';
    GRANT ALL PRIVILEGES ON spotme.* TO 'spotme_user'@'%';

    FLUSH PRIVILEGES;