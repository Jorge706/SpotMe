apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-api
  namespace: spotme
  labels:
    app: users-api
    component: backend
    tier: api
spec:
  replicas: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: users-api
  template:
    metadata:
      labels:
        app: users-api
        component: backend
        tier: api
    spec:
      containers:
      - name: users-api
        image: spotmeacr.azurecr.io/spotme-k8s-users-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 50350
          name: https
          protocol: TCP
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "110m"
            memory: "512Mi"
        envFrom:
          - configMapRef:
              name: laravel-config
          - secretRef:
              name: laravel-secrets
        # Health checks para saber cuándo la aplicación está realmente lista
        readinessProbe:
          httpGet:
            path: /
            port: 50350
            scheme: HTTPS
          initialDelaySeconds: 30    # Espera 30 segundos antes de la primera verificación
          periodSeconds: 10          # Verifica cada 10 segundos
          timeoutSeconds: 5          # Timeout de 5 segundos
          successThreshold: 1        # Considera ready después de 1 éxito
          failureThreshold: 3        # Considera not ready después de 3 fallos
        livenessProbe:
          httpGet:
            path: /
            port: 50350
            scheme: HTTPS
          initialDelaySeconds: 60    # Espera 60 segundos antes de la primera verificación
          periodSeconds: 30          # Verifica cada 30 segundos
          timeoutSeconds: 10         # Timeout de 10 segundos
          failureThreshold: 3        # Reinicia el pod después de 3 fallos consecutivos
        startupProbe:
          httpGet:
            path: /
            port: 50350
            scheme: HTTPS
          initialDelaySeconds: 10    # Espera 10 segundos antes de empezar
          periodSeconds: 5           # Verifica cada 5 segundos
          timeoutSeconds: 5          # Timeout de 5 segundos
          failureThreshold: 30       # Permite hasta 150 segundos (30 * 5) para startup
        volumeMounts:
        - name: default-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.config
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: tls-certs # Nuevo volumeMount para los certificados
          mountPath: /etc/nginx/ssl # Ruta donde Nginx encontrará los certificados
          readOnly: true
        - name: mysql-ca-volume
          mountPath: /etc/ssl/mysql
          readOnly: true

      volumes:
      - name: default-config
        configMap:
          name: users-default-config
      - name: nginx-config
        configMap:
          name: users-nginx-config
      - name: tls-certs # Nuevo volume para los certificados
        secret:
          secretName: tls-secret
          items:
            - key: tls.crt
              path: tls.crt
            - key: tls.key
              path: tls.key
      - name: mysql-ca-volume
        secret:
          secretName: spotme-secrets
          items:
            - key: DB_SSL_CA
              path: ca-cert.pem

---
apiVersion: v1
kind: Service
metadata:
  name: users-api-service
  namespace: spotme
  labels:
    app: users-api
    component: backend
    tier: api
spec:
  type: ClusterIP
  ports:
  - port: 50350
    targetPort: 50350
    protocol: TCP
    name: https
  selector:
    app: users-api
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: users-default-config
  namespace: spotme
data:
  default.config: |
    server {
        listen 50350 ssl; # Nuevo bloque server para HTTPS
        server_name localhost; # Cambia esto por tu nombre de dominio si es diferente

        ssl_certificate /etc/nginx/ssl/tls.crt; # Ruta al certificado
        ssl_certificate_key /etc/nginx/ssl/tls.key; # Ruta a la clave privada

        root /var/www/html/public;
        index index.php index.html index.htm;

        # Security headers (pueden ser los mismos o específicos para HTTPS)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss application/atom+xml image/svg+xml;

        # Handle Laravel routes
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Handle PHP files
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_param HTTPS on; # Importante: indica a PHP-FPM que la conexión es HTTPS
            fastcgi_buffers 16 16k;
            fastcgi_buffer_size 32k;
            fastcgi_read_timeout 300;
        }

        # Deny access to .htaccess files
        location ~ /\.ht {
            deny all;
        }

        # Deny access to sensitive files
        location ~ /\.(env|log|sql|yaml|yml)$ {
            deny all;
        }

        # Static assets caching
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Increase client max body size for file uploads
        client_max_body_size 100M;
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: users-nginx-config
  namespace: spotme
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;

    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
        worker_connections 1024;
        use epoll;
        multi_accept on;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

        access_log /var/log/nginx/access.log main;

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;
        client_max_body_size 100M;

        # Gzip settings
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types
            text/plain
            text/css
            text/xml
            text/javascript
            application/javascript
            application/json
            application/xml+rss
            application/atom+xml
            image/svg+xml;

        # Include virtual host configurations
        include /etc/nginx/conf.d/*.conf;
    }